name: Release CLI binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: binary-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Configure Pulsar state
        run: echo "PULSAR_STATE_HOME=${RUNNER_TEMP}/pulsar-state" >> "$GITHUB_ENV"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build:cli
      - name: Generate checksums
        run: cd dist && sha256sum pulsar-* > SHA256SUMS
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --draft --verify-tag --generate-notes
