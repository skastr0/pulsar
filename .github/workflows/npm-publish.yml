name: Publish npm packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: npm-publish-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Configure Pulsar state
        run: echo "PULSAR_STATE_HOME=${RUNNER_TEMP}/pulsar-state" >> "$GITHUB_ENV"
      - run: bun install --frozen-lockfile
      - run: bun run verify
      - run: bun run build:npm-cli
      - name: Publish packages
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail

          for package_dir in \
            packages/core \
            packages/project-module-sdk \
            packages/shared-signals \
            packages/ts-pack \
            packages/rs-pack \
            packages/project-module-effect \
            packages/project-module-convex \
            packages/npm/pulsar-darwin-arm64 \
            packages/npm/pulsar-darwin-x64 \
            packages/npm/pulsar-linux-arm64 \
            packages/npm/pulsar-linux-x64 \
            packages/npm/pulsar
          do
            echo "Publishing ${package_dir}"
            npm publish "${package_dir}" --access public
          done
