name: taste-codec

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  taste-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run taste score with CI ratcheting
        run: bun packages/codec-cli/src/bin.ts score --ci .

      - name: Show baseline guidance on first adoption
        if: failure()
        run: |
          echo "If this is the first Taste Codec rollout, create a baseline locally:"
          echo "  taste baseline set ."
